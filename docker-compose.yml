services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3008:3000"
    environment:
      DATABASE_URL: postgresql://postgres:Rafa040388@db:5432/owly?schema=public
      JWT_SECRET: Rafa040388-secure-jwt-secret-2026
      NEXTAUTH_URL: http://161.97.144.107:3008
      NEXT_PUBLIC_APP_URL: http://161.97.144.107:3008
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Rafa040388
      POSTGRES_DB: owly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
